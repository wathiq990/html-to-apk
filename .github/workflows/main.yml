name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # تحديد نسخة نظام ثابتة ومستقرة
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # هذه النسخة هي الأكثر استقراراً وتحل مشاكل الصلاحيات تلقائياً
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App
          path: bin/*.apk

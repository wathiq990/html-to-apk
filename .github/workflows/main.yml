name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build with Buildozer
        uses: GearPlug/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: Mobile-App
          path: bin/*.apk

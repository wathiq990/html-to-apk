name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تنصيب بايثون (الإصدار الأحدث المستقر)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. تنصيب Buildozer
      - name: Install Buildozer
        run: |
          pip install --user --upgrade buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 4. بناء التطبيق (هنا المرحلة الحاسمة)
      - name: Build APK
        run: |
          # الموافقة على رخص أندرويد تلقائياً
          yes | buildozer android debug
        
      # 5. رفع الملف الناتج للتحميل
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App
          path: bin/*.apk
